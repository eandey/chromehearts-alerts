name: Chrome Hearts NY appointment watch

on:
  schedule:
    - cron: "*/10 * * * *"   # every ~10 minutes (GitHub may add delays)
  workflow_dispatch:          # lets you run it manually to test

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Restore last-seen state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: watch-state-${{ github.run_id }}
          restore-keys: watch-state-

      - name: Check availability
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python monitor.py

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: watch-state-${{ github.run_id }}

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: |
            screenshot.png
            found.json
          if-no-files-found: ignore
          retention-days: 3
